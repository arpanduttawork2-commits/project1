{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-white py-3">
        <h5 class="mb-0">Your Past Applications</h5>
    </div>
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Destination</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for app in apps %}
                <tr>
                    <td>#{{ app.id }}</td>
                    <td>{{ app.destination }}</td>
                    <td>
                        <span class="badge {{ 'bg-warning' if app.status == 'Pending' else 'bg-success' if app.status == 'Approved' else 'bg-danger' }}">
                            {{ app.status }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
