{% extends 'base.html' %}

{% block content %}
<div class="container text-center py-5">
    <h1 class="display-5 fw-bold">Welcome, {{ current_user.user_name }}</h1>
    <p class="text-muted mb-5">Please select an action below.</p>

    <div class="row justify-content-center g-4">
        <div class="col-md-4">
            <a href="/user/apply" class="card h-100 text-decoration-none shadow-sm hover-shadow transition">
                <div class="card-body py-5">
                    <h3 class="text-primary">Apply for Leave</h3>
                    <p class="text-secondary">Submit a new travel request.</p>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/user/view" class="card h-100 text-decoration-none shadow-sm hover-shadow transition">
                <div class="card-body py-5">
                    <h3 class="text-primary">Your Applications</h3>
                    <p class="text-secondary">Check the status of your requests.</p>
                </div>
            </a>
        </div>
    </div>
</div>
{% endblock %}
