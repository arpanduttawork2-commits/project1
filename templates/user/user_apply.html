{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Request Enterprise Travel</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('user_apply') }}">
                    
                    <div class="mb-3">
                        <label for="destination" class="form-label">Destination Office</label>
                        <select class="form-select" id="destination" name="destination" required>
                            <option value="" selected disabled>Select a city...</option>
                            <option value="Mumbai">Mumbai</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Bangalore">Bangalore</option>
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Chennai">Chennai</option>
                        </select>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="start_date" class="form-label">Start Date</label>
                            <input type="date" class="form-control" id="start_date" name="start_date" required>
                        </div>
                        <div class="col-md-6">
                            <label for="end_date" class="form-label">End Date</label>
                            <input type="date" class="form-control" id="end_date" name="end_date" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="reason" class="form-label">Business Justification</label>
                        <textarea class="form-control" id="reason" name="reason" rows="3" placeholder="Why is this travel required?" required></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('user_home') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">Submit Request</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
